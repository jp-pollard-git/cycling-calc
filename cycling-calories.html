<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cycling Cal">
<title>Cycling Calorie Calc</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #F7F4F0;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 48px;
}
.header {
  background: #1A1A2E;
  padding: 36px 20px 18px;
  display: flex; align-items: center; gap: 12px;
}
.header h1 { color: #fff; font-size: 18px; font-weight: 700; }
.header p  { color: #9A9ABF; font-size: 12px; margin-top: 2px; }

.card {
  background: #fff;
  border-radius: 16px;
  margin: 16px 16px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden;
}
.row { padding: 18px 20px; }
hr { border: none; border-top: 1px solid #F0EDE8; }

.lbl {
  font-size: 11px; color: #888; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 12px; display: block;
}
.row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.val-wrap { display: flex; align-items: center; gap: 8px; }
.val { font-size: 18px; font-weight: 800; color: #1A1A2E; min-width: 90px; text-align: right; }
.tog {
  font-size: 11px; font-weight: 700;
  color: #E8623A;
  background: rgba(232,98,58,0.12);
  border: none; border-radius: 6px;
  padding: 5px 10px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 5px;
  border-radius: 3px;
  background: #E8E4DF;
  outline: none; cursor: pointer; display: block;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #E8623A;
  box-shadow: 0 2px 8px rgba(232,98,58,0.5);
  cursor: pointer;
}

.pill {
  display: inline-block;
  font-size: 12px; font-weight: 700;
  border-radius: 20px; padding: 3px 10px; margin-top: 10px;
}

.result {
  background: #1A1A2E;
  border-radius: 16px;
  margin: 16px 16px 0;
  padding: 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(26,26,46,0.25);
}
.rlbl { color: #9A9ABF; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.rnum { color: #fff; font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
.runit { font-size: 22px; font-weight: 400; color: #9A9ABF; margin-left: 4px; }
.rsub { color: #9A9ABF; font-size: 13px; margin: 10px 0 16px; }
.bar-bg { height: 5px; background: #2E2E4A; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
.bar-fill { height: 5px; border-radius: 3px; }
.rnote { color: #6A6A9A; font-size: 11px; font-style: italic; }

.slbl {
  font-size: 11px; color: #aaa; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 14px 20px 4px; display: block;
}
.brow {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 20px; border-radius: 8px; margin: 0 4px;
}
.bdot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.bname { font-size: 13px; color: #333; font-family: monospace; display: block; }
.bmet  { font-size: 11px; font-weight: 700; display: block; margin-top: 2px; }

.foot {
  font-size: 11px; color: #bbb; text-align: center;
  padding: 16px 24px 0; line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
    <circle cx="7" cy="20" r="5" stroke="#E8623A" stroke-width="2" fill="none"/>
    <circle cx="21" cy="20" r="5" stroke="#E8623A" stroke-width="2" fill="none"/>
    <path d="M7 20 L14 8 L21 20" stroke="#E8623A" stroke-width="2" stroke-linejoin="round" fill="none"/>
    <circle cx="14" cy="8" r="2" fill="#E8623A"/>
    <path d="M10 14 L21 14" stroke="#E8623A" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>Cycling Calorie Calc</h1>
    <p>Road &amp; outdoor cycling</p>
  </div>
</div>

<div class="card">

  <!-- Weight -->
  <div class="row">
    <div class="row-top">
      <span class="lbl">Your weight</span>
      <div class="val-wrap">
        <span class="val" id="wDisp">86 kg</span>
        <button class="tog" id="wBtn">lbs</button>
      </div>
    </div>
    <input type="range" id="wSlider" min="40" max="150" step="1" value="86">
  </div>

  <hr>

  <!-- Speed -->
  <div class="row">
    <div class="row-top">
      <span class="lbl">Average speed</span>
      <div class="val-wrap">
        <span class="val" id="sDisp">22.0 km/h</span>
        <button class="tog" id="sBtn">mph</button>
      </div>
    </div>
    <input type="range" id="sSlider" min="10" max="36" step="0.5" value="22">
    <div class="pill" id="pill"></div>
  </div>

  <hr>

  <!-- Duration -->
  <div class="row">
    <div class="row-top">
      <span class="lbl">Duration</span>
      <div class="val-wrap">
        <span class="val" id="dDisp">1 hr</span>
      </div>
    </div>
    <input type="range" id="dSlider" min="10" max="360" step="5" value="60">
  </div>

</div>

<div class="result">
  <div class="rlbl">Calories burned</div>
  <div class="rnum" id="rCal">— <span class="runit">kcal</span></div>
  <div class="rsub" id="rSub"></div>
  <div class="bar-bg"><div class="bar-fill" id="rBar" style="width:0%"></div></div>
  <div class="rnote" id="rNote"></div>
</div>

<div class="card" id="bandCard"></div>

<div class="foot">
  Calorie estimates use MET values from the Compendium of Physical Activities.<br>
  Results vary with terrain, fitness, and equipment.
</div>

<script>
var BANDS = [
  { label:"< 16 km/h   easy spin",       min:0,   max:15.9, met:4.0,  effort:"Easy",      color:"#4CAF82" },
  { label:"16-19 km/h  light / commute",  min:16,  max:18.9, met:6.0,  effort:"Light",     color:"#7BC67E" },
  { label:"19-22 km/h  moderate / club",  min:19,  max:21.9, met:8.0,  effort:"Moderate",  color:"#F5A623" },
  { label:"22-26 km/h  brisk / sportive", min:22,  max:25.9, met:10.0, effort:"Hard",      color:"#E8623A" },
  { label:"26-30 km/h  fast / training",  min:26,  max:29.9, met:12.0, effort:"Very Hard", color:"#D04020" },
  { label:"> 30 km/h   racing / TT",      min:30,  max:9999, met:15.8, effort:"Max",       color:"#C0392B" }
];

// Load saved prefs
var saved = {};
try { saved = JSON.parse(localStorage.getItem("cyclingCalc") || "{}"); } catch(e) {}

var wUnit = saved.wUnit || "kg";
var sUnit = saved.sUnit || "kmh";

// Set up sliders with saved values
var wSlider = document.getElementById("wSlider");
var sSlider = document.getElementById("sSlider");
var dSlider = document.getElementById("dSlider");

// Restore weight slider
if (wUnit === "lbs") {
  wSlider.min = 88; wSlider.max = 330; wSlider.step = 1;
  document.getElementById("wBtn").textContent = "kg";
}
wSlider.value = saved.wSlider || 86;

// Restore speed slider
if (sUnit === "mph") {
  sSlider.min = 6; sSlider.max = 22; sSlider.step = 0.5;
  document.getElementById("sBtn").textContent = "km/h";
}
sSlider.value = saved.sSlider || 22;

// Restore duration
dSlider.value = saved.dMin || 60;

function save() {
  try {
    localStorage.setItem("cyclingCalc", JSON.stringify({
      wUnit:   wUnit,
      sUnit:   sUnit,
      wSlider: parseFloat(wSlider.value),
      sSlider: parseFloat(sSlider.value),
      dMin:    parseInt(dSlider.value)
    }));
  } catch(e) {}
}

function getBand(kmh) {
  for (var i = 0; i < BANDS.length; i++) {
    if (kmh >= BANDS[i].min && kmh <= BANDS[i].max) return BANDS[i];
  }
  return BANDS[BANDS.length-1];
}

function fmtDur(m) {
  if (m < 60) return m + " min";
  var h = Math.floor(m/60), r = m%60;
  return r ? h + " hr " + r + " min" : h + " hr";
}

function drawBands(activeMet) {
  var html = '<span class="slbl">Speed &amp; effort reference</span>';
  for (var i = 0; i < BANDS.length; i++) {
    var b = BANDS[i];
    html += '<div class="brow" style="background:' + (b.met===activeMet ? b.color+'18' : 'transparent') + '">'
          + '<div class="bdot" style="background:'+b.color+'"></div>'
          + '<div><span class="bname">'+b.label+'</span>'
          + '<span class="bmet" style="color:'+b.color+'">MET '+b.met+' &middot; '+b.effort+'</span>'
          + '</div></div>';
  }
  document.getElementById("bandCard").innerHTML = html;
}

function recalc() {
  var wRaw = parseFloat(wSlider.value);
  var sRaw = parseFloat(sSlider.value);
  var dRaw = parseInt(dSlider.value);

  var kg  = (wUnit === "lbs") ? wRaw * 0.453592 : wRaw;
  var kmh = (sUnit === "mph") ? sRaw * 1.60934  : sRaw;

  document.getElementById("wDisp").textContent =
    (wUnit === "lbs") ? Math.round(wRaw) + " lbs" : Math.round(wRaw) + " kg";
  document.getElementById("sDisp").textContent =
    (sUnit === "mph") ? sRaw.toFixed(1) + " mph" : sRaw.toFixed(1) + " km/h";
  document.getElementById("dDisp").textContent = fmtDur(dRaw);

  var band = getBand(kmh);
  var pill = document.getElementById("pill");
  pill.textContent = band.effort + " effort \u00b7 MET " + band.met;
  pill.style.background = band.color + "22";
  pill.style.color = band.color;

  var cal = Math.round(band.met * kg * (dRaw/60));
  var dkm = (kmh * dRaw/60).toFixed(1);
  var dmi = (dkm * 0.621371).toFixed(1);
  var pct = Math.round(((band.met-4)/(15.8-4))*100);

  document.getElementById("rCal").innerHTML = cal.toLocaleString() + ' <span class="runit">kcal</span>';
  document.getElementById("rSub").innerHTML = dkm + " km &middot; " + dmi + " mi covered";
  document.getElementById("rBar").style.width = pct + "%";
  document.getElementById("rBar").style.background = band.color;
  document.getElementById("rNote").textContent = "MET " + band.met + " \u00b7 " + band.effort + " effort";

  drawBands(band.met);
  save();
}

wSlider.oninput = recalc;
wSlider.onchange = recalc;
sSlider.oninput = recalc;
sSlider.onchange = recalc;
dSlider.oninput = recalc;
dSlider.onchange = recalc;

document.getElementById("wBtn").onclick = function() {
  var v = parseFloat(wSlider.value);
  if (wUnit === "kg") {
    wUnit = "lbs";
    wSlider.min = 88; wSlider.max = 330; wSlider.step = 1;
    wSlider.value = Math.round(v * 2.20462);
    this.textContent = "kg";
  } else {
    wUnit = "kg";
    wSlider.min = 40; wSlider.max = 150; wSlider.step = 1;
    wSlider.value = Math.round(v / 2.20462);
    this.textContent = "lbs";
  }
  recalc();
};

document.getElementById("sBtn").onclick = function() {
  var v = parseFloat(sSlider.value);
  if (sUnit === "kmh") {
    sUnit = "mph";
    sSlider.min = 6; sSlider.max = 22; sSlider.step = 0.5;
    sSlider.value = (v / 1.60934).toFixed(1);
    this.textContent = "km/h";
  } else {
    sUnit = "kmh";
    sSlider.min = 10; sSlider.max = 36; sSlider.step = 0.5;
    sSlider.value = (v * 1.60934).toFixed(1);
    this.textContent = "mph";
  }
  recalc();
};

recalc();
</script>
</body>
</html>
