<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cycling Cal">
<title>Cycling Calorie Calc</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, sans-serif;
  background: #F7F4F0;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 48px;
}
.header {
  background: #1A1A2E;
  padding: 36px 20px 18px;
  display: flex; align-items: center; gap: 12px;
}
.header h1 { color: #fff; font-size: 18px; font-weight: 700; }
.header p  { color: #9A9ABF; font-size: 12px; margin-top: 2px; }

.card {
  background: #fff;
  border-radius: 16px;
  margin: 16px 16px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  overflow: hidden;
}
.row { padding: 18px 20px; }
hr { border: none; border-top: 1px solid #F0EDE8; }

.lbl {
  font-size: 11px; color: #888; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 12px; display: block;
}

.stepper {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0;
}
.step-btn {
  width: 52px; height: 52px;
  border-radius: 12px;
  border: none;
  background: #F0EDE8;
  color: #1A1A2E;
  font-size: 26px;
  font-weight: 300;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  flex-shrink: 0;
}
.step-btn:active { background: #E8623A; color: #fff; }

.step-mid {
  flex: 1;
  text-align: center;
}
.step-val {
  font-size: 28px;
  font-weight: 800;
  color: #1A1A2E;
  display: block;
  line-height: 1;
}
.step-unit {
  font-size: 13px;
  color: #888;
  margin-top: 3px;
  display: block;
}
.tog {
  font-size: 11px; font-weight: 700;
  color: #E8623A;
  background: rgba(232,98,58,0.12);
  border: none; border-radius: 6px;
  padding: 4px 9px; cursor: pointer;
  margin-top: 5px;
  display: inline-block;
  -webkit-tap-highlight-color: transparent;
}

.pill {
  display: inline-block;
  font-size: 12px; font-weight: 700;
  border-radius: 20px; padding: 4px 12px;
  margin-top: 12px;
}

.result {
  background: #1A1A2E;
  border-radius: 16px;
  margin: 16px 16px 0;
  padding: 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(26,26,46,0.25);
}
.rlbl { color: #9A9ABF; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.rnum { color: #fff; font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
.runit { font-size: 22px; font-weight: 400; color: #9A9ABF; margin-left: 4px; }
.rsub { color: #9A9ABF; font-size: 13px; margin: 10px 0 16px; }
.bar-bg { height: 5px; background: #2E2E4A; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
.bar-fill { height: 5px; border-radius: 3px; }
.rnote { color: #6A6A9A; font-size: 11px; font-style: italic; }

.slbl {
  font-size: 11px; color: #aaa; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  padding: 14px 20px 4px; display: block;
}
.brow {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 20px; border-radius: 8px; margin: 0 4px;
}
.bdot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.bname { font-size: 13px; color: #333; font-family: monospace; display: block; }
.bmet  { font-size: 11px; font-weight: 700; display: block; margin-top: 2px; }

.foot {
  font-size: 11px; color: #bbb; text-align: center;
  padding: 16px 24px 0; line-height: 1.6;
}
</style>
</head>
<body>

<div class="header">
  <svg width="30" height="30" viewBox="0 0 28 28" fill="none">
    <circle cx="7" cy="20" r="5" stroke="#E8623A" stroke-width="2" fill="none"/>
    <circle cx="21" cy="20" r="5" stroke="#E8623A" stroke-width="2" fill="none"/>
    <path d="M7 20 L14 8 L21 20" stroke="#E8623A" stroke-width="2" stroke-linejoin="round" fill="none"/>
    <circle cx="14" cy="8" r="2" fill="#E8623A"/>
    <path d="M10 14 L21 14" stroke="#E8623A" stroke-width="1.5" stroke-linecap="round"/>
  </svg>
  <div>
    <h1>Cycling Calorie Calc</h1>
    <p>Road &amp; outdoor cycling</p>
  </div>
</div>

<div class="card">
  <div class="row">
    <span class="lbl">Your weight</span>
    <div class="stepper">
      <button class="step-btn" id="wDown">&#8722;</button>
      <div class="step-mid">
        <span class="step-val" id="wVal">86</span>
        <span class="step-unit" id="wUnit">kg</span>
        <button class="tog" id="wTog">switch to lbs</button>
      </div>
      <button class="step-btn" id="wUp">&#43;</button>
    </div>
  </div>

  <hr>

  <div class="row">
    <span class="lbl">Average speed</span>
    <div class="stepper">
      <button class="step-btn" id="sDown">&#8722;</button>
      <div class="step-mid">
        <span class="step-val" id="sVal">22</span>
        <span class="step-unit" id="sUnit">km/h</span>
        <button class="tog" id="sTog">switch to mph</button>
      </div>
      <button class="step-btn" id="sUp">&#43;</button>
    </div>
    <div class="pill" id="pill"></div>
  </div>

  <hr>

  <div class="row">
    <span class="lbl">Duration</span>
    <div class="stepper">
      <button class="step-btn" id="dDown">&#8722;</button>
      <div class="step-mid">
        <span class="step-val" id="dVal">60</span>
        <span class="step-unit">minutes</span>
      </div>
      <button class="step-btn" id="dUp">&#43;</button>
    </div>
  </div>
</div>

<div class="result">
  <div class="rlbl">Calories burned</div>
  <div class="rnum" id="rCal">— <span class="runit">kcal</span></div>
  <div class="rsub" id="rSub"></div>
  <div class="bar-bg"><div class="bar-fill" id="rBar" style="width:0%"></div></div>
  <div class="rnote" id="rNote"></div>
</div>

<div class="card" id="bandCard"></div>

<div class="foot">
  Calorie estimates use MET values from the Compendium of Physical Activities.<br>
  Results vary with terrain, fitness, and equipment.
</div>

<script>
var BANDS = [
  { label:"< 16 km/h   easy spin",       min:0,   max:15.9, met:4.0,  effort:"Easy",      color:"#4CAF82" },
  { label:"16-19 km/h  light / commute",  min:16,  max:18.9, met:6.0,  effort:"Light",     color:"#7BC67E" },
  { label:"19-22 km/h  moderate / club",  min:19,  max:21.9, met:8.0,  effort:"Moderate",  color:"#F5A623" },
  { label:"22-26 km/h  brisk / sportive", min:22,  max:25.9, met:10.0, effort:"Hard",      color:"#E8623A" },
  { label:"26-30 km/h  fast / training",  min:26,  max:29.9, met:12.0, effort:"Very Hard", color:"#D04020" },
  { label:"> 30 km/h   racing / TT",      min:30,  max:9999, met:15.8, effort:"Max",       color:"#C0392B" }
];

// Load saved state or use defaults
var saved = {};
try { saved = JSON.parse(localStorage.getItem("cyclingCalc") || "{}"); } catch(e) {}

var wKg   = saved.wKg   || 86;
var sKmh  = saved.sKmh  || 22;
var dMin  = saved.dMin  || 60;
var wUnit = saved.wUnit || "kg";
var sUnit = saved.sUnit || "kmh";

function save() {
  try {
    localStorage.setItem("cyclingCalc", JSON.stringify({
      wKg: wKg, sKmh: sKmh, dMin: dMin, wUnit: wUnit, sUnit: sUnit
    }));
  } catch(e) {}
}

function getBand(kmh) {
  for (var i = 0; i < BANDS.length; i++) {
    if (kmh >= BANDS[i].min && kmh <= BANDS[i].max) return BANDS[i];
  }
  return BANDS[BANDS.length-1];
}

function drawBands(activeMet) {
  var html = '<span class="slbl">Speed &amp; effort reference</span>';
  for (var i = 0; i < BANDS.length; i++) {
    var b = BANDS[i];
    html += '<div class="brow" style="background:' + (b.met===activeMet ? b.color+'18' : 'transparent') + '">'
          + '<div class="bdot" style="background:'+b.color+'"></div>'
          + '<div><span class="bname">'+b.label+'</span>'
          + '<span class="bmet" style="color:'+b.color+'">MET '+b.met+' &middot; '+b.effort+'</span>'
          + '</div></div>';
  }
  document.getElementById("bandCard").innerHTML = html;
}

function render() {
  var wDisplay = wUnit === "lbs" ? Math.round(wKg * 2.20462) : Math.round(wKg);
  document.getElementById("wVal").textContent  = wDisplay;
  document.getElementById("wUnit").textContent = wUnit;
  document.getElementById("wTog").textContent  = "switch to " + (wUnit === "kg" ? "lbs" : "kg");

  var sDisplay = sUnit === "mph" ? (sKmh / 1.60934).toFixed(1) : sKmh.toFixed(1);
  document.getElementById("sVal").textContent  = sDisplay;
  document.getElementById("sUnit").textContent = sUnit === "mph" ? "mph" : "km/h";
  document.getElementById("sTog").textContent  = "switch to " + (sUnit === "kmh" ? "mph" : "km/h");

  document.getElementById("dVal").textContent = dMin;

  var band = getBand(sKmh);
  var pill = document.getElementById("pill");
  pill.textContent = band.effort + " effort \u00b7 MET " + band.met;
  pill.style.background = band.color + "22";
  pill.style.color = band.color;

  var cal = Math.round(band.met * wKg * (dMin/60));
  var dkm = (sKmh * dMin/60).toFixed(1);
  var dmi = (dkm * 0.621371).toFixed(1);
  var pct = Math.round(((band.met-4)/(15.8-4))*100);

  document.getElementById("rCal").innerHTML = cal.toLocaleString() + ' <span class="runit">kcal</span>';
  document.getElementById("rSub").innerHTML = dkm + " km &middot; " + dmi + " mi covered";
  document.getElementById("rBar").style.width = pct + "%";
  document.getElementById("rBar").style.background = band.color;
  document.getElementById("rNote").textContent = "MET " + band.met + " \u00b7 " + band.effort + " effort";

  drawBands(band.met);
  save();
}

document.getElementById("wDown").onclick = function() { wKg = Math.max(40,  wKg - 1); render(); };
document.getElementById("wUp").onclick   = function() { wKg = Math.min(200, wKg + 1); render(); };
document.getElementById("wTog").onclick  = function() {
  wUnit = (wUnit === "kg") ? "lbs" : "kg"; render();
};

document.getElementById("sDown").onclick = function() {
  var step = sUnit === "mph" ? 0.80467 : 0.5;
  sKmh = Math.max(8,  parseFloat((sKmh - step).toFixed(2))); render();
};
document.getElementById("sUp").onclick = function() {
  var step = sUnit === "mph" ? 0.80467 : 0.5;
  sKmh = Math.min(50, parseFloat((sKmh + step).toFixed(2))); render();
};
document.getElementById("sTog").onclick = function() {
  sUnit = (sUnit === "kmh") ? "mph" : "kmh"; render();
};

document.getElementById("dDown").onclick = function() { dMin = Math.max(5,   dMin - 5); render(); };
document.getElementById("dUp").onclick   = function() { dMin = Math.min(480, dMin + 5); render(); };

render();
</script>
</body>
</html>
